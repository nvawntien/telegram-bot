name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache: true
      - name: Unit tests
        run: go test -race ./...
      - name: Vet
        run: go vet ./...
      - name: Build commands
        run: go build ./cmd/...
      - name: Lint
        run: go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.8.0 run
      - name: Verify generated SQL
        run: |
          go run github.com/sqlc-dev/sqlc/cmd/sqlc@v1.30.0 generate
          git diff --exit-code -- internal/postgres/generated

