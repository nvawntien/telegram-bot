  TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-local-development-secret}
  TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL:-http://localhost:8080/webhooks/telegram}
  ADMIN_TELEGRAM_IDS: ${ADMIN_TELEGRAM_IDS:-123456789}
  SUPPORT_CONTACT: ${SUPPORT_CONTACT:-Vui lòng liên hệ quản trị viên cửa hàng.}
  TELEGRAM_WEBHOOK_BODY_LIMIT_BYTES: ${TELEGRAM_WEBHOOK_BODY_LIMIT_BYTES:-1048576}
  TELEGRAM_WEBHOOK_TIMEOUT_SECONDS: ${TELEGRAM_WEBHOOK_TIMEOUT_SECONDS:-5}
  TELEGRAM_UPDATE_STALE_SECONDS: ${TELEGRAM_UPDATE_STALE_SECONDS:-120}
  ADMIN_SESSION_TTL_MINUTES: ${ADMIN_SESSION_TTL_MINUTES:-15}
  TELEGRAM_API_TIMEOUT_SECONDS: ${TELEGRAM_API_TIMEOUT_SECONDS:-5}
  INVENTORY_ENCRYPTION_KEY: ${INVENTORY_ENCRYPTION_KEY:-MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
  INVENTORY_ENCRYPTION_KEY_VERSION: ${INVENTORY_ENCRYPTION_KEY_VERSION:-1}
  INVENTORY_IMPORT_MAX_ITEMS: ${INVENTORY_IMPORT_MAX_ITEMS:-100}
  INVENTORY_IMPORT_MAX_ITEM_BYTES: ${INVENTORY_IMPORT_MAX_ITEM_BYTES:-4096}
  INVENTORY_IMPORT_MAX_TOTAL_BYTES: ${INVENTORY_IMPORT_MAX_TOTAL_BYTES:-262144}
  BANK_ACCOUNT_ENCRYPTION_KEY: ${BANK_ACCOUNT_ENCRYPTION_KEY:-MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
  BANK_ACCOUNT_ENCRYPTION_KEY_VERSION: ${BANK_ACCOUNT_ENCRYPTION_KEY_VERSION:-1}
  ORDER_EXPIRE_MINUTES: ${ORDER_EXPIRE_MINUTES:-15}
  ORDER_MAX_QUANTITY: ${ORDER_MAX_QUANTITY:-10}
  SIGNED_JSON_WEBHOOK_SECRET: ${SIGNED_JSON_WEBHOOK_SECRET:-}
  SIGNED_JSON_TIMESTAMP_TOLERANCE: ${SIGNED_JSON_TIMESTAMP_TOLERANCE:-300}
  PAYMENT_WEBHOOK_BODY_LIMIT: ${PAYMENT_WEBHOOK_BODY_LIMIT:-1048576}
  VIETQR_BASE_URL: ${VIETQR_BASE_URL:-https://img.vietqr.io/image/}
  VIETQR_TEMPLATE: ${VIETQR_TEMPLATE:-compact2}
  ORDER_PAGE_SIZE: ${ORDER_PAGE_SIZE:-8}
  BANK_ACCOUNT_PAGE_SIZE: ${BANK_ACCOUNT_PAGE_SIZE:-8}
  DELIVERY_MAX_ATTEMPTS: ${DELIVERY_MAX_ATTEMPTS:-5}
  DELIVERY_RETRY_BASE_SECONDS: ${DELIVERY_RETRY_BASE_SECONDS:-5}

x-worker-environment: &worker-environment
  <<: *common-environment
  ORDER_EXPIRY_INTERVAL: ${ORDER_EXPIRY_INTERVAL:-30}
  ORDER_EXPIRY_BATCH_SIZE: ${ORDER_EXPIRY_BATCH_SIZE:-100}
  ORDER_EXPIRY_RUN_TIMEOUT: ${ORDER_EXPIRY_RUN_TIMEOUT:-10}

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: shop
      POSTGRES_USER: shop
      POSTGRES_PASSWORD: shop
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shop -d shop"]
      interval: 3s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  migrate:
    build: .
    entrypoint: ["/app/migrate"]
    command: ["up"]
    environment:
      DATABASE_URL: postgres://shop:shop@postgres:5432/shop?sslmode=disable
      MIGRATIONS_DIR: /app/migrations
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build: .
    environment:
      <<: *api-environment
      HTTP_ADDR: :8080
    ports:
      - "8080:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  worker:
    build: .
    entrypoint: ["/app/worker"]
    environment:
      <<: *worker-environment
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres-data:
